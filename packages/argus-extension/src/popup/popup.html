<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Argus CDP Bridge</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				font-size: 13px;
				width: 360px;
				min-height: 240px;
				max-height: 640px;
				background: #f3f5f7;
				color: #27313b;
				overflow: hidden;
				scrollbar-width: none;
			}

			.header {
				padding: 12px 16px 14px;
				background: linear-gradient(180deg, #ffffff 0%, #f7fafc 100%);
				border-bottom: 1px solid #e0e0e0;
				display: flex;
				flex-direction: column;
				gap: 12px;
			}

			.header-top {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.header h1 {
				font-size: 15px;
				font-weight: 600;
				color: #333;
			}

			.status-indicator {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #ff5722;
			}

			.status-indicator.connected {
				background: #4caf50;
			}

			.status-text {
				font-size: 11px;
				color: #697684;
				margin-left: auto;
			}

			.target-bar {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}

			.target-pill {
				display: grid;
				grid-template-columns: auto minmax(0, 1fr);
				align-items: center;
				gap: 10px;
				min-width: 0;
				padding: 10px 12px;
				border-radius: 10px;
				background: #edf4fb;
				border: 1px solid #d6e5f5;
			}

			.target-pill.empty {
				background: #f7f9fb;
				border-color: #e1e7ed;
			}

			.target-pill-kind {
				flex-shrink: 0;
				padding: 3px 7px;
				border-radius: 999px;
				background: #d8e9fb;
				color: #235b8d;
				font-size: 10px;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.4px;
			}

			.target-pill.empty .target-pill-kind {
				background: #e8edf2;
				color: #667482;
			}

			.target-pill-meta {
				display: flex;
				flex-direction: column;
				gap: 2px;
				min-width: 0;
			}

			.target-pill-title,
			.target-pill-url {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.target-pill-title {
				font-size: 12px;
				font-weight: 600;
				color: #223140;
			}

			.target-pill-url {
				font-size: 11px;
				color: #607080;
			}

			.copy-actions {
				display: flex;
				flex-wrap: wrap;
				justify-content: flex-start;
				gap: 6px;
			}

			.copy-button {
				padding: 6px 8px;
				border: 1px solid #d3dbe4;
				border-radius: 7px;
				background: #fff;
				color: #425364;
				font-size: 11px;
				cursor: pointer;
			}

			.copy-button:hover:not(:disabled) {
				border-color: #9fc2e6;
				color: #1b5e92;
			}

			.copy-button:disabled {
				cursor: default;
				opacity: 0.45;
			}

			.page {
				padding: 12px;
				overflow-y: auto;
				max-height: 520px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				scrollbar-width: none;
				-ms-overflow-style: none;
			}

			.content {
				overflow: visible;
			}

			/* Hide scrollbars while keeping scroll behavior */
			body::-webkit-scrollbar,
			.page::-webkit-scrollbar {
				display: none;
			}

			.panel {
				background: #fff;
				border: 1px solid #e2e7ec;
				border-radius: 10px;
				padding: 12px;
			}

			.error-banner {
				padding: 10px 12px;
				border-radius: 10px;
				background: #fff0f0;
				border: 1px solid #f1b4b4;
				color: #a03434;
				font-size: 12px;
				line-height: 1.4;
			}

			.hidden {
				display: none;
			}

			.health-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px 14px;
			}

			.health-item {
				display: flex;
				flex-direction: column;
				gap: 2px;
				min-width: 0;
			}

			.health-label {
				font-size: 10px;
				font-weight: 700;
				letter-spacing: 0.4px;
				text-transform: uppercase;
				color: #7a8794;
			}

			.health-value {
				font-size: 12px;
				font-weight: 500;
				color: #223140;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.health-value.connected {
				color: #2e7d32;
			}

			.health-value.disconnected {
				color: #c62828;
			}

			.section-title {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: #666;
				margin-bottom: 10px;
			}

			.tab-list {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}

			.tab-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				background: #fff;
				border-radius: 6px;
				cursor: pointer;
				transition: outline-color 0.15s;
				outline: 2px solid transparent;
				outline-offset: -2px;
			}

			.tab-item:hover {
				outline-color: #90caf9;
			}

			.tab-item.attached {
				background: #e8f5e9;
				border: 1px solid #81c784;
			}

			.tab-favicon {
				width: 16px;
				height: 16px;
				border-radius: 2px;
				flex-shrink: 0;
			}

			.tab-info {
				flex: 1;
				min-width: 0;
			}

			.tab-title {
				font-weight: 500;
				color: #333;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.tab-url {
				font-size: 11px;
				color: #888;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.tab-action {
				padding: 4px 10px;
				font-size: 11px;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				flex-shrink: 0;
			}

			.tab-action.attach {
				background: #e3f2fd;
				color: #1976d2;
			}

			.tab-action.attach:hover {
				background: #bbdefb;
			}

			.tab-action.detach {
				background: #ffebee;
				color: #d32f2f;
			}

			.tab-action.detach:hover {
				background: #ffcdd2;
			}

			.target-list {
				display: flex;
				flex-direction: column;
				gap: 6px;
				margin: -2px 0 8px 26px;
			}

			.target-item {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				width: 100%;
				padding: 8px 10px;
				border: 1px solid #dce3ea;
				border-radius: 6px;
				background: #fff;
				cursor: pointer;
				text-align: left;
			}

			.target-item:hover {
				border-color: #90caf9;
			}

			.target-item.selected {
				background: #e3f2fd;
				border-color: #64b5f6;
			}

			.target-kind {
				flex-shrink: 0;
				min-width: 44px;
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.4px;
				color: #5f6b76;
				padding-top: 2px;
			}

			.target-meta {
				display: flex;
				flex-direction: column;
				min-width: 0;
				gap: 2px;
			}

			.target-title {
				font-size: 12px;
				font-weight: 500;
				color: #23303d;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.target-url {
				font-size: 11px;
				color: #7b8793;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.empty-state {
				text-align: center;
				padding: 40px 20px;
				color: #888;
			}

			.empty-state .icon {
				font-size: 32px;
				margin-bottom: 12px;
			}

			.loading {
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 28px;
				color: #888;
			}

			.event-list {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}

			.event-item {
				padding: 8px 10px;
				border-radius: 8px;
				background: #f6f8fa;
				border: 1px solid #e3e8ed;
			}

			.event-item.error {
				background: #fff4f4;
				border-color: #f0c6c6;
			}

			.event-meta {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-bottom: 4px;
				font-size: 10px;
				text-transform: uppercase;
				letter-spacing: 0.4px;
				color: #7a8794;
			}

			.event-level {
				font-weight: 700;
			}

			.event-message {
				font-size: 12px;
				line-height: 1.35;
				color: #293847;
			}

			.footer {
				padding: 10px 16px;
				background: #fff;
				border-top: 1px solid #e0e0e0;
				font-size: 11px;
				color: #888;
				display: flex;
				justify-content: space-between;
			}

			.footer a {
				color: #1976d2;
				text-decoration: none;
			}

			.footer a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<div class="header-top">
				<div class="status-indicator" id="statusIndicator"></div>
				<h1>Argus CDP Bridge</h1>
				<span class="status-text" id="statusText">Connecting...</span>
			</div>
			<div class="target-bar">
				<div class="target-pill empty" id="currentTargetPill">
					<span class="target-pill-kind" id="currentTargetKind">Target</span>
					<div class="target-pill-meta">
						<div class="target-pill-title" id="currentTargetTitle">No target selected</div>
						<div class="target-pill-url" id="currentTargetUrl">Attach a tab to get started</div>
					</div>
				</div>
				<div class="copy-actions">
					<button class="copy-button" id="copyInfoButton" type="button">Copy info</button>
				</div>
			</div>
		</div>

		<div class="page">
			<div class="error-banner hidden" id="errorBanner"></div>

			<div class="panel">
				<div class="section-title">Health</div>
				<div class="health-grid">
					<div class="health-item">
						<div class="health-label">Native Host</div>
						<div class="health-value" id="healthBridge">Unknown</div>
					</div>
					<div class="health-item">
						<div class="health-label">Watcher ID</div>
						<div class="health-value" id="healthWatcherId">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Attached Tabs</div>
						<div class="health-value" id="healthAttachedCount">0</div>
					</div>
					<div class="health-item">
						<div class="health-label">Selected Target</div>
						<div class="health-value" id="healthSelectedTarget">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Last Message</div>
						<div class="health-value" id="healthLastMessage">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Host PID</div>
						<div class="health-value" id="healthPid">-</div>
					</div>
				</div>
			</div>

			<div class="panel">
				<div class="section-title">Tabs</div>
				<div class="content" id="content">
					<div class="loading">Loading tabs...</div>
				</div>
			</div>

			<div class="panel">
				<div class="section-title">Recent Events</div>
				<div class="event-list" id="eventList">
					<div class="loading">Waiting for events...</div>
				</div>
			</div>
		</div>

		<div class="footer">
			<span id="attachedCount">0 attached</span>
			<a href="https://github.com/vforsh/argus" target="_blank">Documentation</a>
		</div>

		<script src="../../dist/popup/popup.js" type="module"></script>
	</body>
</html>
