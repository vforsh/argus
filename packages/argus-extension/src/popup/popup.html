<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Argus CDP Bridge</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				font-size: 13px;
				width: 360px;
				min-height: 240px;
				max-height: 640px;
				background: #f3f5f7;
				color: #27313b;
				overflow: hidden;
				scrollbar-width: none;
			}

			.header {
				padding: 12px 16px 14px;
				background: linear-gradient(180deg, #ffffff 0%, #f7fafc 100%);
				border-bottom: 1px solid #e0e0e0;
			}

			.header-top {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.header h1 {
				font-size: 15px;
				font-weight: 600;
				color: #333;
			}

			.status-indicator {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #ff5722;
			}

			.status-indicator.connected {
				background: #4caf50;
			}

			.status-text {
				font-size: 11px;
				color: #697684;
				margin-left: auto;
			}

			.tab-actions {
				display: flex;
				gap: 6px;
				flex-shrink: 0;
			}

			.tab-action {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				border: none;
				cursor: pointer;
			}

			.tab-action.icon-only {
				width: 28px;
				height: 28px;
				padding: 0;
				border-radius: 8px;
			}

			.tab-action svg {
				width: 14px;
				height: 14px;
				stroke: currentColor;
			}

			.tab-action.copy {
				background: #fff;
				color: #425364;
				border: 1px solid #d3dbe4;
			}

			.tab-action.copy:hover:not(:disabled) {
				border-color: #9fc2e6;
				color: #1b5e92;
			}

			.page {
				padding: 12px;
				overflow-y: auto;
				max-height: 520px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				scrollbar-width: none;
				-ms-overflow-style: none;
			}

			/* Hide scrollbars while keeping scroll behavior */
			body::-webkit-scrollbar,
			.page::-webkit-scrollbar {
				display: none;
			}

			.panel {
				background: #fff;
				border: 1px solid #e2e7ec;
				border-radius: 10px;
				padding: 12px;
			}

			.error-banner {
				padding: 10px 12px;
				border-radius: 10px;
				background: #fff0f0;
				border: 1px solid #f1b4b4;
				color: #a03434;
				font-size: 12px;
				line-height: 1.4;
			}

			.hidden {
				display: none;
			}

			.health-grid {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px 14px;
			}

			.health-item {
				display: flex;
				flex-direction: column;
				gap: 2px;
				min-width: 0;
			}

			.health-label {
				font-size: 10px;
				font-weight: 700;
				letter-spacing: 0.4px;
				text-transform: uppercase;
				color: #7a8794;
			}

			.health-value {
				font-size: 12px;
				font-weight: 500;
				color: #223140;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.health-value.connected {
				color: #2e7d32;
			}

			.health-value.disconnected {
				color: #c62828;
			}

			.section-title {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: #666;
				margin-bottom: 10px;
			}

			.panel-button {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 6px 9px;
				border: 1px solid #d3dbe4;
				border-radius: 8px;
				background: #fff;
				color: #425364;
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				flex-shrink: 0;
			}

			.panel-actions {
				display: flex;
				justify-content: flex-end;
				gap: 8px;
				margin-top: 12px;
			}

			.panel-button svg {
				width: 14px;
				height: 14px;
				stroke: currentColor;
			}

			.panel-button:hover:not(:disabled) {
				border-color: #9fc2e6;
				color: #1b5e92;
			}

			.panel-button.danger {
				border-color: #f0c6c6;
				color: #c0392b;
			}

			.panel-button.danger:hover:not(:disabled) {
				border-color: #e59b9b;
				color: #a62c20;
			}

			.panel-button:disabled {
				cursor: default;
				opacity: 0.45;
			}

			.tab-list {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}

			.tab-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				background: #fff;
				border-radius: 6px;
				cursor: pointer;
				transition: outline-color 0.15s;
				outline: 2px solid transparent;
				outline-offset: -2px;
			}

			.tab-item:hover {
				outline-color: #90caf9;
			}

			.tab-item.attached {
				background: #e8f5e9;
				border: 1px solid #81c784;
			}

			.tab-favicon {
				width: 16px;
				height: 16px;
				border-radius: 2px;
				flex-shrink: 0;
			}

			.tab-info {
				flex: 1;
				min-width: 0;
			}

			.tab-title {
				font-weight: 500;
				color: #333;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.tab-url {
				font-size: 11px;
				color: #888;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.tab-action.attach {
				background: #e3f2fd;
				color: #1976d2;
				padding: 4px 10px;
				font-size: 11px;
				border-radius: 4px;
			}

			.tab-action.attach:hover {
				background: #bbdefb;
			}

			.tab-action:disabled {
				cursor: default;
				opacity: 0.45;
			}

			.tab-action.detach {
				background: #ffebee;
				color: #d32f2f;
			}

			.tab-action.detach:hover {
				background: #ffcdd2;
			}

			.target-list {
				display: flex;
				flex-direction: column;
				gap: 6px;
				margin: -2px 0 8px 26px;
			}

			.target-item {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				width: 100%;
				padding: 8px 10px;
				border: 1px solid #dce3ea;
				border-radius: 6px;
				background: #fff;
				cursor: pointer;
				text-align: left;
			}

			.target-item:hover {
				border-color: #90caf9;
			}

			.target-item.selected {
				background: #e3f2fd;
				border-color: #64b5f6;
			}

			.target-kind {
				flex-shrink: 0;
				min-width: 44px;
				font-size: 10px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.4px;
				color: #5f6b76;
				padding-top: 2px;
			}

			.target-meta {
				display: flex;
				flex-direction: column;
				min-width: 0;
				gap: 2px;
			}

			.target-title {
				font-size: 12px;
				font-weight: 500;
				color: #23303d;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.target-url {
				font-size: 11px;
				color: #7b8793;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.empty-state {
				text-align: center;
				padding: 40px 20px;
				color: #888;
			}

			.empty-state .icon {
				font-size: 32px;
				margin-bottom: 12px;
			}

			.loading {
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 28px;
				color: #888;
			}

			.footer {
				padding: 10px 16px;
				background: #fff;
				border-top: 1px solid #e0e0e0;
				font-size: 11px;
				color: #888;
				display: flex;
				justify-content: space-between;
			}

			.footer a {
				color: #1976d2;
				text-decoration: none;
			}

			.footer a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<div class="header-top">
				<div class="status-indicator" id="statusIndicator"></div>
				<h1>Argus CDP Bridge</h1>
				<span class="status-text" id="statusText">Connecting...</span>
			</div>
		</div>

		<div class="page">
			<div class="error-banner hidden" id="errorBanner"></div>

			<div class="panel">
				<div class="section-title">Health</div>
				<div class="health-grid">
					<div class="health-item">
						<div class="health-label">Native Host</div>
						<div class="health-value" id="healthBridge">Unknown</div>
					</div>
					<div class="health-item">
						<div class="health-label">Watcher ID</div>
						<div class="health-value" id="healthWatcherId">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Attached Tabs</div>
						<div class="health-value" id="healthAttachedCount">0</div>
					</div>
					<div class="health-item">
						<div class="health-label">Selected Target</div>
						<div class="health-value" id="healthSelectedTarget">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Last Message</div>
						<div class="health-value" id="healthLastMessage">-</div>
					</div>
					<div class="health-item">
						<div class="health-label">Host PID</div>
						<div class="health-value" id="healthPid">-</div>
					</div>
				</div>
				<div class="panel-actions">
					<button
						class="panel-button"
						id="copyAllButton"
						type="button"
						title="Copy all watcher info"
						aria-label="Copy all watcher info"
						disabled
					>
						<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
							<path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
						</svg>
						<span data-button-label>Copy All</span>
					</button>
					<button
						class="panel-button danger"
						id="detachAllButton"
						type="button"
						title="Detach all watchers"
						aria-label="Detach all watchers"
						disabled
					>
						<svg viewBox="0 0 16 16" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M5.4 1.75h5.2l3.65 3.65v5.2l-3.65 3.65H5.4l-3.65-3.65V5.4z"></path>
							<path d="M6 6l4 4"></path>
							<path d="M10 6l-4 4"></path>
						</svg>
						<span data-button-label>Detach All</span>
					</button>
				</div>
			</div>

			<div class="panel" id="attachedSection">
				<div class="section-title">Attached Tabs</div>
				<div id="attachedContent">
					<div class="loading">Loading tabs...</div>
				</div>
			</div>

			<div class="panel" id="availableSection">
				<div class="section-title">Available Tabs</div>
				<div id="availableContent">
					<div class="loading">Loading tabs...</div>
				</div>
			</div>
		</div>

		<div class="footer">
			<span id="attachedCount">0 attached</span>
			<a href="https://github.com/vforsh/argus" target="_blank">Documentation</a>
		</div>

		<script src="../../dist/popup/popup.js" type="module"></script>
	</body>
</html>
